<style>
  :root{
    --black:#05030d;
    --black2:#09051a;
    --panel:rgba(255,255,255,.055);
    --panel2:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.14);

    --neonPurple:#B100FF;
    --neonPink:#FF2BD6;
    --neonAqua:#00F5FF;
    --neonYellow:#F7FF2B;

    --text:#EEE7FF;
    --muted:rgba(238,231,255,.78);

    --radius:18px;
    --shadow: 0 26px 86px rgba(0,0,0,.62);

    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(1200px 700px at 18% 10%, rgba(177,0,255,.26), transparent 60%),
      radial-gradient(900px 540px at 85% 18%, rgba(255,43,214,.20), transparent 58%),
      radial-gradient(900px 640px at 55% 88%, rgba(0,245,255,.13), transparent 62%),
      linear-gradient(180deg, var(--black), var(--black2));
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  .wrap{
    max-width: 1040px;
    margin: 0 auto;
    padding: 44px 18px 64px;
    position:relative;
    z-index:1;
  }

  /* ===== Neon runner outline (clean ring) ===== */
  .neonWrap{
    position: relative;
    border-radius: calc(var(--radius) + 10px);
    padding: 1px;
    overflow:hidden;
    background: rgba(0,0,0,0);
  }

  .neonWrap::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius: inherit;
    padding: 2px;
    background: conic-gradient(
      from 0deg,
      rgba(247,255,43,.05),
      rgba(247,255,43,.95),
      rgba(247,255,43,.05),
      rgba(247,255,43,.05)
    );
    animation: ringSpin 7.5s linear infinite;

    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  .neonWrap::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius: inherit;
    box-shadow:
      0 0 0 1px rgba(247,255,43,.06),
      0 0 22px rgba(247,255,43,.10),
      0 0 28px rgba(177,0,255,.06);
    pointer-events:none;
  }

  @keyframes ringSpin{ to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce){
    .neonWrap::before{ animation:none; }
  }

  .neonInner{
    position:relative;
    z-index:1;
    border-radius: calc(var(--radius) + 9px);
    border: 1px solid rgba(255,255,255,.10);
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
    overflow:hidden;
  }

  /* HERO */
  .hero{
    position:relative;
    padding: 26px 22px;
    background:
      linear-gradient(135deg,
        rgba(177,0,255,.10),
        rgba(255,43,214,.06),
        rgba(0,245,255,.05)
      );
  }

  .hero::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:
      radial-gradient(680px 280px at 20% 20%, rgba(177,0,255,.18), transparent 60%),
      radial-gradient(680px 280px at 80% 35%, rgba(255,43,214,.12), transparent 60%),
      radial-gradient(720px 320px at 55% 90%, rgba(0,245,255,.10), transparent 65%);
    filter: blur(22px);
    opacity:.30;
    z-index:0;
  }
  .hero > *{ position:relative; z-index:1; }

  h1{
    margin:0 0 6px;
    font-size: clamp(30px, 3.2vw, 44px);
    letter-spacing: -.02em;
    line-height: 1.12;
  }

  .accentText{
    background: linear-gradient(90deg,
      rgba(247,255,43,.70),
      rgba(247,255,43,1),
      rgba(247,255,43,.70)
    );
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight: 950;
    text-shadow:
      0 0 10px rgba(247,255,43,.18),
      0 0 18px rgba(247,255,43,.10);
  }

  .sub{
    margin:0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
    max-width: 84ch;
  }

  .underline{
    height:2px;
    width: 210px;
    margin-top:12px;
    background: linear-gradient(90deg, var(--neonPink), var(--neonPurple), var(--neonAqua), var(--neonYellow));
    border-radius: 999px;
    opacity:.90;
    box-shadow: 0 0 14px rgba(247,255,43,.10);
  }

  .tag{
    margin-top:12px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .pill{
    border: 1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.14);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    color: rgba(238,231,255,.86);
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns: 1.35fr .65fr;
    gap: 16px;
    margin-top: 18px;
  }
  @media (max-width: 900px){
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    padding: 18px;
    border-radius: calc(var(--radius) + 9px);
    background: var(--panel2);
  }

  .sectionTitle{
    display:flex;
    align-items:center;
    gap:10px;
    margin:0 0 12px;
    font-size: 13px;
    letter-spacing: .10em;
    text-transform: uppercase;
    color: rgba(247,255,43,.92);
    text-shadow: 0 0 12px rgba(247,255,43,.12);
  }

  .spark{
    width:10px; height:10px;
    border-radius:999px;
    background: linear-gradient(135deg, var(--neonPurple), var(--neonPink), var(--neonAqua), var(--neonYellow));
    box-shadow: 0 0 14px rgba(0,245,255,.12);
  }

  .demo{
    display:flex;
    gap:14px;
    padding:14px;
    border-radius:16px;
    background: rgba(0,0,0,.16);
    border: 1px solid rgba(255,255,255,.10);
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
    text-decoration:none;
    color: inherit;
    margin-bottom: 12px;
  }
  .demo:hover{
    transform: translateY(-2px);
    background: rgba(0,0,0,.22);
    border-color: rgba(255,255,255,.16);
  }

  .badge{
    flex:0 0 auto;
    width: 46px; height:46px;
    border-radius: 16px;
    display:grid;
    place-items:center;
    border: 1px solid rgba(255,255,255,.14);
    background: linear-gradient(135deg, rgba(177,0,255,.20), rgba(255,43,214,.14), rgba(0,245,255,.12));
    font-weight: 900;
    font-family: var(--mono);
    letter-spacing: .04em;
    color: rgba(247,255,43,.92);
    text-shadow: 0 0 10px rgba(247,255,43,.12);
  }

  .demo h3{
    margin:0;
    font-size: 15.5px;
    line-height:1.2;
    color: rgba(238,231,255,.92);
  }
  .demo p{
    margin:6px 0 0;
    color: rgba(238,231,255,.74);
    font-size: 13.5px;
    line-height: 1.35;
  }

  .links a{
    display:block;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.14);
    text-decoration:none;
    color: rgba(238,231,255,.90);
    margin-bottom: 10px;
    transition: background .12s ease, border-color .12s ease, transform .12s ease;
  }
  .links a:hover{
    transform: translateY(-1px);
    background: rgba(0,0,0,.20);
    border-color: rgba(255,255,255,.18);
  }

  .about{
    margin:12px 0 0;
    color: rgba(238,231,255,.78);
    font-size: 13.2px;
    line-height: 1.55;
  }
  .about strong{
    color: rgba(238,231,255,.92);
    font-weight: 800;
  }
  .about ul{
    margin:10px 0 0;
    padding-left: 18px;
    color: rgba(238,231,255,.72);
  }
  .about li{ margin:6px 0; }

  .footer{
    margin-top: 18px;
    color: rgba(238,231,255,.58);
    font-size: 12.5px;
    text-align:center;
  }
</style>
